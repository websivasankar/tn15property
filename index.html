<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TN15 Property | Land for Sale in Kallakurichi</title>

  <meta name="description" content="Verified land, farm land & plots in Kallakurichi district. Watch video tours and contact directly." />

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- React & Babel Scripts -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { margin:0; font-family:'DM Sans', sans-serif; background:#f6f1e8; color:#333; }
    * { box-sizing:border-box; }
    h1, h2, h3 { margin-top:0; }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState } = React;

// Branding Colors
const BRAND = {
  green: "#1a3d2b",
  cream: "#f6f1e8",
  amber: "#c8973a",
  border: "#ddd",
};

// Listings Data
const LISTINGS = [
  { id:1, yt:"3JZ_D3ELwOQ", title:"4.5 Acres Patta Land", loc:"Sankarapuram", type:"Agricultural Land", price:"₹18L/acre"},
  { id:2, yt:"dQw4w9WgXcQ", title:"1800 Sq.ft Plot", loc:"Kallakurichi", type:"Plot", price:"₹22 Lakhs"},
  { id:3, yt:"LXb3EKWsInQ", title:"2.25 Acres Farm", loc:"Chinnasalem", type:"Farm Land", price:"₹12L/acre"},
  { id:4, yt:"9bZkp7q19f0", title:"6 Acres Land", loc:"Ulundurpet", type:"Agricultural Land", price:"₹9L/acre"},
  { id:5, yt:"kJQP7kiw5Fk", title:"50 Cents Plot", loc:"Kallakurichi", type:"Plot", price:"₹8 Lakhs"},
  { id:6, yt:"JGwWNGJdvx8", title:"3 Acres Land", loc:"Tirukoilur", type:"Farm Land", price:"₹14L/acre"}
];

// Modal Component for Video Playback
function Modal({ video, onClose }) {
  return (
    <div onClick={onClose} style={{
      position:"fixed", inset:0, background:"rgba(0,0,0,0.85)",
      display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000
    }}>
      <div onClick={e=>e.stopPropagation()} style={{width:"90%", maxWidth:800, position:"relative"}}>
        <button onClick={onClose} style={{position:"absolute", top:-40, right:0, background:"none", border:"none", color:"white", fontSize:20, cursor:"pointer"}}>Close</button>
        <iframe
          width="100%" 
          height="450"
          /* Changed to youtube-nocookie and added origin parameter */
          src={`https://youtube-nocookie.com{video}?autoplay=1&rel=0`}
          frameBorder="0" 
          allow="autoplay; encrypted-media; picture-in-picture"
          allowFullScreen
          /* This line fixes Error 153 */
          referrerPolicy="strict-origin-when-cross-origin"
        />
      </div>
    </div>
  );
}

// Card Component
function Card({ item, onClick }) {
  return (
    <div onClick={onClick} style={{
      border:`1px solid ${BRAND.border}`, borderRadius:10, overflow:"hidden",
      cursor:"pointer", background:"#fff", transition:"transform 0.2s",
      ":hover": {transform: "translateY(-5px)"}
    }}>
      <img src={`https://img.youtube.com/vi/${item.yt}/mqdefault.jpg`} width="100%" height="auto" alt={item.title} style={{display:"block"}}/>
      <div style={{padding:15}}>
        <div style={{fontSize:"0.8rem", color:BRAND.amber, fontWeight:700, textTransform:"uppercase"}}>{item.type}</div>
        <div style={{fontSize:"1.1rem", fontWeight:700, margin:"5px 0"}}>{item.title}</div>
        <div style={{color:"#666", marginBottom:10}}>{item.loc}</div>
        <div style={{color:BRAND.green, fontWeight:700, fontSize:"1.2rem"}}>{item.price}</div>
      </div>
    </div>
  );
}

// Main App
function App() {
  const [modal,setModal]=useState(null);

  return (
    <div>
      {/* HEADER */}
      <div style={{background:BRAND.green, color:"#fff", padding:"30px 20px", textAlign:"center"}}>
        <h1 style={{margin:0}}>TN15 Property</h1>
        <p style={{margin:"10px 0 0", opacity:0.9}}>Verified Land, Farm Land & Plots in Kallakurichi District</p>
      </div>

      {/* GRID */}
      <div style={{
        display:"grid",
        gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",
        gap:25,
        padding:25,
        maxWidth:1200,
        margin:"0 auto"
      }}>
        {LISTINGS.map(i=>(
          <Card key={i.id} item={i} onClick={()=>setModal(i.yt)} />
        ))}
      </div>

      {/* MODAL */}
      {modal && <Modal video={modal} onClose={()=>setModal(null)} />}
    </div>
  );
}

// Render
ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
