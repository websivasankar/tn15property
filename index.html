<!DOCTYPE html>
<html lang="en-IN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TN15 Property | Land for Sale in Kallakurichi</title>

<meta name="description" content="Verified land, farm land & plots in Kallakurichi district. Watch video tours and contact directly via WhatsApp or phone." />

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body { margin:0; font-family:'DM Sans', sans-serif; background:#f6f1e8; }
.container { max-width:1200px; margin:auto; padding:20px; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:20px;
}

.card {
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  border:1px solid #ddd;
  cursor:pointer;
  transition:0.2s;
}
.card:hover { transform:translateY(-5px); }

.btn {
  display:block;
  padding:10px;
  text-align:center;
  border-radius:6px;
  text-decoration:none;
  font-weight:600;
}

.btn-wa { background:#1a3d2b; color:#fff; }

.filter {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

select {
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
}

.pagination {
  text-align:center;
  margin-top:20px;
}
.pagination button {
  margin:5px;
  padding:8px 12px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

/* Sticky WhatsApp */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:#fff;
  padding:12px 16px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
  z-index:999;
}
</style>
</head>

<body>

<div id="root"></div>

<!-- Sticky WhatsApp -->
<a href="https://wa.me/919884346789" class="whatsapp">WhatsApp</a>

<script type="text/babel">

const { useState, useMemo } = React;

const BRAND = {
  green:"#1a3d2b",
  amber:"#c8973a"
};

const WHATSAPP = "919884346789";

// DATA
const LISTINGS = [
  { id:1, yt:"hAlETgO7l-k", title:"KMS Nagar", loc:"Kallakurichi", type:"Plot", price:"₹10L/cent"},
  {   id:6,
  yt:"VEXxiCKiI-0",
  title:"Elumalaiyan Nagar(DTCP)",
  loc:"Thiagadurgam",
  type:"Plot",
  price:"₹4 Lakhs/Cent"
},
  { id:3, yt:"ScMzIvxBSi4", title:"Agricultural Land Chinnasalem", loc:"Chinnasalem", type:"Agricultural", price:"₹6L/acre"},
  { id:4, yt:"aqz-KE-bpKQ", title:"DTCP Approved Plots", loc:"Kallakurichi", type:"Plot", price:"₹12L/cent"},
  { id:5, yt:"dQw4w9WgXcQ", title:"Highway Facing Land", loc:"Sankarapuram", type:"Farm", price:"₹15L/acre"}
];

function Modal({ video, onClose }) {
  return (
    <div onClick={onClose} style={{
      position:"fixed", inset:0, background:"rgba(0,0,0,0.85)",
      display:"flex", alignItems:"center", justifyContent:"center"
    }}>
      <div onClick={e=>e.stopPropagation()} style={{width:"90%", maxWidth:800}}>
        <iframe
          width="100%"
          height="450"
          src={`https://www.youtube-nocookie.com/embed/${video}?autoplay=1`}
          title="Property Video"
          allow="autoplay; encrypted-media"
          allowFullScreen
        />
      </div>
    </div>
  );
}

function Card({ item, open }) {
  return (
    <div className="card" onClick={()=>open(item.yt)}>

      <div style={{position:"relative"}}>
        <img src={`https://img.youtube.com/vi/${item.yt}/hqdefault.jpg`} width="100%"/>
        <div style={{
          position:"absolute",
          top:"50%", left:"50%",
          transform:"translate(-50%,-50%)",
          background:"rgba(0,0,0,0.6)",
          color:"#fff",
          padding:"10px 15px",
          borderRadius:"50%"
        }}>▶</div>
      </div>

      <div style={{padding:15}}>
        <div style={{color:BRAND.amber, fontSize:12, fontWeight:700}}>{item.type}</div>
        <h3>{item.title}</h3>
        <div style={{color:"#666"}}>{item.loc}</div>
        <div style={{color:BRAND.green, fontWeight:700}}>{item.price}</div>

        <a
          href={`https://wa.me/${WHATSAPP}?text=Interested in ${item.title} at ${item.loc} (${item.price})`}
          target="_blank"
          className="btn btn-wa"
          onClick={e=>e.stopPropagation()}
        >
          WhatsApp Enquiry
        </a>
      </div>
    </div>
  );
}

function App() {
  const [modal,setModal]=useState(null);
  const [loc,setLoc]=useState("");
  const [type,setType]=useState("");
  const [page,setPage]=useState(1);

  const perPage = 4;

  const filtered = useMemo(()=>{
    return LISTINGS.filter(i =>
      (!loc || i.loc===loc) &&
      (!type || i.type===type)
    );
  },[loc,type]);

  const totalPages = Math.ceil(filtered.length/perPage);

  const paginated = filtered.slice((page-1)*perPage,page*perPage);

  return (
    <div>

      {/* HEADER */}
      <div style={{background:BRAND.green, color:"#fff", padding:"15px 20px"}}>
        <div style={{
          maxWidth:1200, margin:"auto",
          display:"flex",
justifyContent:"space-between",
alignItems:"center",
flexWrap:"wrap",
gap:"10px"
        }}>

<a href="/" style={{ textDecoration:"none" }}>
  <div style={{
    display:"flex",
    flexDirection:"column",
    lineHeight:"1"
  }}>
    
    <div style={{
      display:"flex",
      alignItems:"baseline",
      gap:"4px"
    }}>
      <span style={{
        fontSize:"26px",
        fontWeight:"900",
        color:"#f5c542"
      }}>
        TN15
      </span>

      <span style={{
        fontSize:"20px",
        fontWeight:"700",
        color:"#ffffff"
      }}>
        Property
      </span>

      <span style={{
        fontSize:"14px",
        color:"#ddd"
      }}>
        .com
      </span>
    </div>

    <span style={{
      fontSize:"10px",
      color:"#ccc",
      marginTop:"2px"
    }}>
      Kallakurichi Lands & Plots
    </span>

  </div>
</a>

          <a href="tel:+919884346789" style={{
            background:BRAND.amber,
            padding:"8px 14px",
            borderRadius:"6px",
            color:"#000",
            textDecoration:"none",
            fontWeight:"700"
          }}>
            📞 Call Now
          </a>

        </div>
      </div>

      {/* SEO TEXT */}
      <div className="container">
        <h2>Land for Sale in Kallakurichi</h2>
        <p>
          Explore verified plots, farm land, and agricultural land in Kallakurichi,
          Sankarapuram, and Chinnasalem. Direct owner listings with WhatsApp contact.
        </p>
      </div>

      <div className="container">

        {/* FILTER */}
        <div className="filter">
          <select onChange={e=>{setLoc(e.target.value); setPage(1);}}>
            <option value="">All Locations</option>
            <option>Kallakurichi</option>
            <option>Sankarapuram</option>
            <option>Chinnasalem</option>
          </select>

          <select onChange={e=>{setType(e.target.value); setPage(1);}}>
            <option value="">All Types</option>
            <option>Plot</option>
            <option>Farm</option>
            <option>Agricultural</option>
          </select>
        </div>

        {/* GRID */}
        <div className="grid">
          {paginated.map(i=>(
            <Card key={i.id} item={i} open={setModal}/>
          ))}
        </div>

        {/* PAGINATION */}
        <div className="pagination">
          {[...Array(totalPages)].map((_,i)=>(
            <button key={i} onClick={()=>setPage(i+1)}>
              {i+1}
            </button>
          ))}
        </div>

      </div>

      {modal && <Modal video={modal} onClose={()=>setModal(null)}/>}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
